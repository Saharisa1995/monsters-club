<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Monsters' Club</title>
<meta name="theme-color" content="#1C1C1E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Monsters' Club">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#FFFFFF;
    --card:#FFFFFF;
    --ink:#1C1C1E;
    --ink-soft:#6B6B6F;
    --ink-faint:#A8A8AC;
    --line:#F0EFEC;
    --green:#3FB97B;
    --green-soft:#E6F7EE;
    --red:#E5594B;
    --red-soft:#FCEAE8;
    --amber:#E8A23B;
    --amber-soft:#FBF2E2;
    --blue:#4C8DF6;
    --blue-soft:#EAF1FE;
    --purple:#9678EB;
    --pink:#F0507A;
    --pink-soft:#FDE9EE;
    --radius-lg:20px;
    --radius-md:16px;
    --radius-sm:10px;
    --shadow:0 1px 2px rgba(28,28,30,0.04), 0 6px 16px rgba(28,28,30,0.05);
    font-size:16px;
  }
  /* Habit row gradient palette, matched to reference app */
  .hue-1{ background:linear-gradient(135deg,#FF8A80,#FF6F61); } /* Deep Work red */
  .hue-2{ background:linear-gradient(135deg,#C9A6F5,#A98CE8); } /* Read purple */
  .hue-3{ background:linear-gradient(135deg,#5FD3E0,#38B6D9); } /* Water teal */
  .hue-4{ background:linear-gradient(135deg,#7C93F5,#4C6EF0); } /* Workout blue */
  .hue-5{ background:linear-gradient(135deg,#A9C0D6,#8EA9C4); } /* Meditation slate */
  .hue-6{ background:linear-gradient(135deg,#FFC168,#FFA53D); } /* Review orange */
  .hue-7{ background:linear-gradient(135deg,#FF9DBB,#F0507A); } /* Pink */
  .hue-8{ background:linear-gradient(135deg,#8CE0C3,#4FC79B); } /* Mint */
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    position:relative;
    padding-bottom:90px;
  }

  .login-screen{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:32px 24px;
    padding-top:calc(32px + env(safe-area-inset-top));
  }
  .login-logo{text-align:center; margin-bottom:30px;}
  .login-logo .badge{
    width:64px;height:64px;border-radius:20px;background:var(--ink);color:#fff;
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;
  }
  .login-title{font-size:26px;font-weight:800;letter-spacing:-0.4px;}
  .login-sub{font-size:14px;color:var(--ink-soft);margin-top:4px;}
  .auth-card{background:var(--card); border-radius:var(--radius-lg); box-shadow:var(--shadow); padding:20px;}
  .auth-tabs{display:flex; background:var(--line); border-radius:24px; padding:3px; margin-bottom:18px;}
  .auth-tab{flex:1; border:none; background:none; padding:9px 0; font-size:13px; font-weight:700; color:var(--ink-soft); border-radius:20px; cursor:pointer;}
  .auth-tab.active{background:var(--card); color:var(--ink); box-shadow:var(--shadow);}
  .auth-error{
    background:var(--red-soft); color:var(--red); font-size:13px; font-weight:600;
    padding:10px 12px; border-radius:var(--radius-sm); margin-bottom:12px; display:none;
  }
  .auth-error.show{display:block;}
  .login-loading{text-align:center; padding:60px 0; color:var(--ink-soft); font-size:14px;}

  .header{padding:14px 20px 8px; position:sticky; top:0; background:var(--bg); z-index:30; padding-top:calc(14px + env(safe-area-inset-top));}
  .header-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:10px;}
  .greeting{font-size:20px; font-weight:800; letter-spacing:-0.3px; flex:1; text-align:center;}
  .date-sub{font-size:12.5px; color:var(--ink-soft); margin-top:2px; text-align:center;}
  .header-actions{display:flex; gap:8px; flex-shrink:0;}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;background:var(--card);border:none;
    display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);
    cursor:pointer;color:var(--ink);flex-shrink:0;
  }
  .icon-btn:active{transform:scale(0.94);}
  .logout-btn{
    width:auto;border-radius:20px;padding:0 14px 0 12px;gap:6px;color:var(--red);font-size:13px;font-weight:700;
  }
  .logout-btn span{white-space:nowrap;}

  .me-strip{display:flex;align-items:center;gap:10px;padding:4px 20px 14px;}
  .me-strip .avatar{width:40px;height:40px;font-size:14px;}
  .me-strip-info{flex:1;min-width:0;}
  .me-strip-name{font-size:14px;font-weight:700; overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .me-strip-role{font-size:11.5px;color:var(--ink-soft);}
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;}

  .summary-card{margin:2px 20px 16px;background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:16px 18px;display:flex;align-items:center;gap:16px;}
  .ring-wrap{position:relative; width:60px; height:60px; flex-shrink:0;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}
  .summary-text{flex:1;}
  .summary-title{font-size:14px;font-weight:700;}
  .summary-sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .summary-stats{display:flex; gap:16px; margin-top:8px;}
  .stat{display:flex;flex-direction:column;}
  .stat-num{font-size:16px;font-weight:700;}
  .stat-label{font-size:10.5px;color:var(--ink-faint);margin-top:1px;}

  .section-row{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin:6px 0 10px;}
  .section-title{font-size:18px;font-weight:700;letter-spacing:-0.2px;}
  .section-action{font-size:13px;font-weight:600;color:var(--pink);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;}

  /* ---- Date strip (Mo Tu We Th Fr Sa Su, circular day markers) ---- */
  .date-strip{display:flex;justify-content:space-between;padding:6px 18px 16px;}
  .date-col{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;}
  .date-col-label{font-size:12px;color:var(--ink-faint);font-weight:600;}
  .date-col.selected .date-col-label{color:var(--ink);}
  .date-circle{
    width:34px;height:34px;border-radius:50%;
    border:2px solid var(--pink-soft);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;color:var(--ink-soft);
    cursor:pointer; background:#fff;
    transition:all .15s ease;
  }
  .date-circle.has-progress{border-color:var(--pink);}
  .date-col.selected .date-circle{border-color:var(--ink); border-width:2.5px; color:var(--ink); font-weight:700;}
  .date-col.future .date-circle{color:var(--ink-faint); border-color:var(--line);}

  /* ---- Filter pill + mood icon row above date strip ---- */
  .filter-row{display:flex; align-items:center; justify-content:space-between; padding:0 20px 10px;}
  .filter-pill{
    background:var(--pink); color:#fff; border:none; border-radius:20px;
    padding:8px 14px; font-size:14px; font-weight:700;
    display:flex; align-items:center; gap:4px; cursor:pointer;
  }
  .filter-pill .ti{font-size:13px;}
  .mood-badge{
    width:36px;height:36px;border-radius:50%;
    background:var(--amber-soft);
    display:flex;align-items:center;justify-content:center;
    font-size:17px; cursor:pointer; position:relative;
  }

  /* ---- Habit rows: bold gradient cards ---- */
  .habit-list{display:flex;flex-direction:column;gap:12px;padding:0 20px;}
  .habit-card{
    position:relative;
    border-radius:18px;
    padding:16px 16px;
    display:flex;align-items:center;gap:12px;
    overflow:hidden;
    min-height:64px;
    color:#fff;
  }
  .habit-progress-fill{
    position:absolute; inset:0;
    background:rgba(255,255,255,0.28);
    width:0%;
    transition:width .3s ease;
    pointer-events:none;
  }
  .habit-color-dot{
    width:38px;height:38px;border-radius:11px;
    background:rgba(255,255,255,0.35);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;font-size:19px; position:relative; z-index:1;
  }
  .habit-info{flex:1; min-width:0; position:relative; z-index:1;}
  .habit-name{font-size:15.5px;font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#fff;}
  .habit-progress-label{
    display:inline-block; margin-top:4px;
    background:rgba(255,255,255,0.32);
    color:#fff; font-size:11px; font-weight:600;
    padding:2px 8px; border-radius:8px;
  }
  .habit-streak-badge{
    position:absolute; top:14px; right:52px; z-index:1;
    font-size:11.5px; font-weight:700; color:#fff;
    display:flex; align-items:center; gap:3px;
    background:rgba(0,0,0,0.12); padding:3px 8px; border-radius:10px;
  }
  .check-btn{
    width:34px;height:34px;border-radius:50%;
    border:2px solid rgba(255,255,255,0.55);
    background:rgba(255,255,255,0.15);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:transparent;transition:all .15s ease;
    position:relative; z-index:1;
  }
  .check-btn.done{background:#3EC46D;border-color:#3EC46D;color:#fff;}
  .check-btn svg{width:16px;height:16px;}
  .check-btn:active{transform:scale(0.9);}
  .check-btn.loading{opacity:0.5; pointer-events:none;}

  .empty-state{text-align:center;padding:60px 40px;color:var(--ink-soft);}
  .empty-state-circle{
    width:110px;height:110px;border-radius:50%;
    background:var(--pink-soft);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 22px;
  }
  .empty-state-circle .ti{font-size:44px; color:var(--pink);}
  .empty-state .ti{font-size:36px; color:var(--ink-faint); margin-bottom:10px; display:block;}
  .empty-state-title{font-size:15px; color:var(--ink-soft); line-height:1.5; max-width:260px; margin:0 auto;}

  .lb-toggle{display:flex;background:var(--line);border-radius:24px;padding:3px;margin:0 20px 16px;}
  .lb-toggle-btn{flex:1;border:none;background:none;padding:9px 0;font-size:13px;font-weight:700;color:var(--ink-soft);border-radius:20px;cursor:pointer;}
  .lb-toggle-btn.active{background:var(--card); color:var(--ink); box-shadow:var(--shadow);}
  .leaderboard{margin:0 20px;background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;}
  .lb-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);}
  .lb-row:last-child{border-bottom:none;}
  .lb-row.me{background:var(--blue-soft);}
  .lb-rank{width:22px;font-size:13px;font-weight:700;color:var(--ink-faint);text-align:center;flex-shrink:0;}
  .lb-rank.top1{color:var(--amber);}
  .lb-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0;}
  .lb-name{flex:1;font-size:14px;font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .lb-score{font-size:14px;font-weight:700; flex-shrink:0; width:46px; text-align:right;}
  .lb-bar-track{height:5px;background:var(--line);border-radius:3px;overflow:hidden;flex:1.4;}
  .lb-bar-fill{height:100%; border-radius:3px;}
  .lb-sub-label{padding:0 20px 8px;font-size:12px;color:var(--ink-faint);}

  .member-list{display:flex;flex-direction:column;gap:10px;padding:0 20px;}
  .member-row{background:var(--card);border-radius:var(--radius-md);box-shadow:var(--shadow);padding:14px;display:flex;align-items:center;gap:12px;}
  .member-info{flex:1;min-width:0;}
  .member-name{font-size:15px;font-weight:600;color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .member-sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}

  .bottom-nav{
    position:fixed;bottom:0; left:0; right:0;max-width:480px;margin:0 auto;
    background:rgba(245,244,241,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--line);display:flex;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));z-index:40;
  }
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--ink-faint);font-size:10.5px;font-weight:600;padding:6px 0;cursor:pointer;}
  .nav-btn.active{color:var(--pink);}
  .nav-btn .ti{font-size:21px;}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.38);z-index:90;display:none;align-items:flex-end;justify-content:center;}
  .overlay.show{display:flex;}
  .sheet{width:100%;max-width:480px;background:var(--card);border-radius:24px 24px 0 0;padding:14px 20px calc(24px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;animation:slideUp .25s ease;}
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;} to{transform:translateY(0);opacity:1;}}
  .sheet-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px;}
  .sheet-title{font-size:19px;font-weight:700;margin-bottom:16px;}
  .field-label{font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:14px 0 7px;text-transform:uppercase;letter-spacing:0.3px;}
  .field-label:first-of-type{margin-top:0;}
  .field-hint{font-size:12px;color:var(--ink-faint); margin-top:6px; line-height:1.4;}
  input[type=text], input[type=email], input[type=password]{
    width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--line);
    background:#FAFAF9;font-size:15px;font-family:inherit;color:var(--ink);outline:none;margin-bottom:10px;
  }
  input:focus{border-color:var(--ink);}
  .swatch-row, .icon-row{display:flex;flex-wrap:wrap;gap:10px;}
  .swatch{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;position:relative;flex-shrink:0;}
  .swatch.selected::after{content:"";position:absolute;inset:-4px;border:2px solid var(--ink);border-radius:50%;}
  .icon-opt{width:42px;height:42px;border-radius:12px;border:1.5px solid var(--line);background:#FAFAF9;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;}
  .icon-opt.selected{border-color:var(--ink); background:var(--ink); color:#fff;}
  .freq-row{display:flex; gap:8px; flex-wrap:wrap;}
  .freq-opt{padding:9px 14px;border-radius:20px;border:1.5px solid var(--line);background:#FAFAF9;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft);}
  .freq-opt.selected{background:var(--ink); border-color:var(--ink); color:#fff;}
  .role-row{display:flex;gap:8px;}
  .role-opt{flex:1;padding:11px 8px;border-radius:var(--radius-sm);border:1.5px solid var(--line);background:#FAFAF9;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink-soft);text-align:center;}
  .role-opt.selected{background:var(--ink); border-color:var(--ink); color:#fff;}
  .sheet-actions{display:flex; gap:10px; margin-top:22px;}
  .btn{flex:1;padding:13px;border-radius:var(--radius-sm);border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn-primary{background:var(--ink); color:#fff;}
  .btn-primary:active{opacity:.85;}
  .btn-primary:disabled{opacity:.5;}
  .btn-secondary{background:var(--line); color:var(--ink);}
  .btn-danger{background:var(--red-soft); color:var(--red);}
  .person-color-row{display:flex;flex-wrap:wrap;gap:10px;}

  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:all .25s ease;z-index:100;max-width:90%;text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  ::-webkit-scrollbar{width:0;height:0;}
  @media (max-width:360px){.greeting{font-size:22px;}}
</style>
</head>
<body>

<div id="root"><div class="login-screen"><div class="login-loading">Loading Monsters' Club&hellip;</div></div></div>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
